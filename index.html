	<!-- Scripts -->

	<script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.2/dist/markdown-it.min.js"></script> <!-- MarkdownIt -->
	<script async type="module">
		//// Convert markdown file and JSON to HTML

		/// Default language
		/** The language from the URL parameters */
		const langParam = new URLSearchParams(location.search).get("lang")

		// Set cookie to lang param
		if (langParam) document.cookie = `lang=${langParam}; samesite=lax; max-age=${60 * 60 * 24 * 31}; secure;` // Expires in one month

		/** 
		 * The language of the website. Priorities of where to get the language from:
		 * - URL Parameter
		 * - Cookie
		 * - default system/browser language
		 * - English
		 */
		let language = langParam || document.cookie.split("; ").find(row => row.startsWith("lang="))?.split("=")[1] || navigator.language.substring(0, 2) || "en"
		let text = await fetch(`./pages/main/languages/${language}/main.md`)
		if (!text.ok) {
			language = "en"
			text = await fetch("./pages/main/languages/en/main.md")
		}
		let json = await fetch(`./pages/main/languages/${language}/words.json`)
		json = await json.json()

		// Site Name
		for (const element of document.getElementsByClassName("siteName")) element.innerHTML = json.other["Builderment Seeds"]

		// Free Palestine
		document.getElementById("freePalestineText").innerHTML = json.other["Free Palestine"] + "."
		document.getElementById("disclaimerText").innerHTML = json.other["Disclaimer"]

		// Main and footer
		await(async () => {
			const md = window.markdownit()

			/** Default token generator */
			const proxy = (tokens, idx, options, env, self) => self.renderToken(tokens, idx, options)

			const defaultLinkOpenRenderer = md.renderer.rules.link_open || proxy
			/**
			 * <a>
			 * Add target="_blank" attribute whenever there is ~ after the link.
			 * @param tokens List of all tokens being parsed
			 * @param {number} idx Number that corresponds to the key of the current token in tokens
			 * @param options The options defined when creating the new markdown-it object ({} in our case)
			 * @param self A reference to the renderer itself
			 */
			md.renderer.rules.link_open = function(tokens, idx, options, env, self) {
				for (let i = 1; i < tokens.length - idx - 1; i++) {
					if (tokens[idx + i].type === "link_close") {
						// if there is ~ after the link tag
						if (tokens[idx + i + 1].content[0] === "~") {
							// Add target="_blank"
							tokens[idx].attrJoin("target", "_blank")

							// Remove ~
							tokens[idx + i + 1].content = tokens[idx + i + 1].content.slice(1)
						}
						break
					}
				}

				// Return the default settings
				return defaultLinkOpenRenderer(tokens, idx, options, env, self)
			}

			// Main
			text = await text.text()
			document.getElementsByTagName("html")[0].lang = language
			document.querySelector("header.collection").innerHTML += md.render(text)

			// Footer
			text = await fetch(`./pages/main/languages/${language}/footer.md`)
			text = await text.text()
			document.getElementById("footerText").innerHTML = md.render(text)
		})()

		// Resources
		const dataHeader = document.getElementById("dataHeader");
		(() => {
			const resourceFilter = document.getElementById("resourceFilter")

			// None
			resourceFilter.children[0].innerHTML = json.other["None"]

			// Raw Resources
			resourceFilter.children[1].label = json.other["Raw Resources"]
			for (const option of resourceFilter.children[1].children) option.innerHTML = json.resources[option.value]

			// Other Resources
			const otherResourcesArr = []
			resourceFilter.children[2].label = json.other["Other"]
			for (const option of resourceFilter.children[2].children) {
				option.innerHTML = json.resources[option.value]
				otherResourcesArr.push(option)
			}
			otherResourcesArr.sort((a, b) => {
				if (a.innerHTML == b.innerHTML) return 0
				return a.innerHTML > b.innerHTML ? 1 : -1
			})
			resourceFilter.children[2].innerHTML = ""
			for (const option of otherResourcesArr) resourceFilter.children[2].appendChild(option)
		})();

		// Filter
		(() => {
			// Resources Filter
			document.getElementById("resource").innerHTML = json.filter["Resource"]

			// Amount Filter
			document.getElementById("filter").innerHTML = json.filter["Filter"]
			// Min & Max
			document.querySelector("option[value='Max']").innerHTML = json.filter["Max"]
			document.querySelector("option[value='Min']").innerHTML = json.filter["Min"]
			// Amount
			document.getElementById("amount").placeholder = json.filter["Amount"]
			// Seed
			document.querySelector("option[value='Seed']").innerHTML = json.other["Seed"]
			document.getElementById("filterSeed").placeholder = json.other["Seed"]
			// Asc Dsc
			document.querySelector("option[value='Ascending']").innerHTML = json.filter["Ascending"]
			document.querySelector("option[value='Descending']").innerHTML = json.filter["Descending"]

			// World Size Filter
			document.getElementById("worldSizeCheckName").innerHTML = json.filter["World Size"]

			// Resource Amount Filter
			document.getElementById("resourceAmountCheckName").innerHTML = json.filter["Resource Amount"]

			// Calculate with Power Plants
			document.getElementById("withPowerPlantsCheckName").innerHTML = json.filter["Calculate with Power Plants"]

			// Total Results
			document.getElementById("totalResultsName").innerHTML = json.filter["Total Results"]
		})();

		// Table Data
		(() => {
			dataHeader.children[0].firstChild.innerHTML = json.other["Seed"]
			dataHeader.children[1].firstChild.innerHTML = json.resources["Wood Log"]
			dataHeader.children[2].firstChild.innerHTML = json.resources["Stone"]
			dataHeader.children[3].firstChild.innerHTML = json.resources["Iron Ore"]
			dataHeader.children[4].firstChild.innerHTML = json.resources["Copper Ore"]
			dataHeader.children[5].firstChild.innerHTML = json.resources["Coal"]
			dataHeader.children[6].firstChild.innerHTML = json.resources["Wolframite"]
			dataHeader.children[7].firstChild.innerHTML = json.resources["Uranium Ore"]
			dataHeader.children[8].firstChild.innerHTML = json.filter["World Size"]
			dataHeader.children[9].firstChild.innerHTML = json.filter["Resource Amount"]
			dataHeader.children[10].firstChild.innerHTML = json.filter["Resource"]
		})()

		//// Footer
		window.addEventListener("DOMContentLoaded", () => {
			document.getElementsByTagName("footer")[0].innerHTML += '<p><a href="https://icons8.com/icon/3685/globe"><img style="width: 15px; height: 15px;" src="https://img.icons8.com/ios/100/globe--v1.png" alt="Globe"></a> icon by <a href="https://icons8.com">Icons8</a></p>'
		})
	</script>
